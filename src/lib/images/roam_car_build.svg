<svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg" style="background:#0A0A0F">
<defs>
  <style>
    .chassis     { opacity:0; animation: slideUp  0.55s cubic-bezier(0.34,1.56,0.64,1) 0.20s forwards }
    .body-lower  { opacity:0; animation: slideUp  0.50s cubic-bezier(0.34,1.56,0.64,1) 0.75s forwards }
    .roof        { opacity:0; animation: dropIn   0.50s cubic-bezier(0.34,1.56,0.64,1) 1.25s forwards }
    .windshield  { opacity:0; animation: fadeIn   0.35s ease                           1.65s forwards }
    .side-win    { opacity:0; animation: fadeIn   0.35s ease                           1.85s forwards }
    .headlights  { opacity:0; animation: fadeIn   0.30s ease                           2.10s forwards }
    .taillights  { opacity:0; animation: fadeIn   0.30s ease                           2.20s forwards }
    .details     { opacity:0; animation: fadeIn   0.30s ease                           2.40s forwards }
    .wheel-l     { opacity:0; transform-origin:64px 158px;  animation: wheelRoll 0.60s cubic-bezier(0.34,1.56,0.64,1) 2.70s forwards }
    .wheel-r     { opacity:0; transform-origin:188px 158px; animation: wheelRoll 0.60s cubic-bezier(0.34,1.56,0.64,1) 2.95s forwards }
    .bumpers     { opacity:0; animation: slideOut 0.40s cubic-bezier(0.34,1.56,0.64,1) 3.30s forwards }
    .gloss       { opacity:0; animation: fadeIn   0.60s ease                           3.60s forwards }
    .shadow-fl   { opacity:0; animation: fadeIn   0.50s ease                           3.80s forwards }

    @keyframes slideUp  { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    @keyframes dropIn   { from{opacity:0;transform:translateY(-32px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes wheelRoll{ from{opacity:0;transform:scale(0.3) rotate(-180deg)} to{opacity:1;transform:scale(1) rotate(0deg)} }
    @keyframes slideOut { from{opacity:0;transform:scaleX(0.4)} to{opacity:1;transform:scaleX(1)} }
  </style>

  <linearGradient id="g-surf" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#F0F0F4"/>
    <stop offset="55%"  stop-color="#D8D8E0"/>
    <stop offset="100%" stop-color="#B0B0BE"/>
  </linearGradient>
  <linearGradient id="g-side" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#C8C8D4"/>
    <stop offset="100%" stop-color="#8A8A9A"/>
  </linearGradient>
  <linearGradient id="g-dark" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#A8A8B8"/>
    <stop offset="100%" stop-color="#707080"/>
  </linearGradient>
  <linearGradient id="g-glass" x1="15%" y1="10%" x2="85%" y2="90%">
    <stop offset="0%"   stop-color="#E4E4F0" stop-opacity="0.92"/>
    <stop offset="100%" stop-color="#9898B0" stop-opacity="0.75"/>
  </linearGradient>
  <linearGradient id="g-tire" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#484858"/>
    <stop offset="100%" stop-color="#242430"/>
  </linearGradient>
  <linearGradient id="g-rim" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#888898"/>
    <stop offset="100%" stop-color="#404050"/>
  </linearGradient>

  <filter id="f-float" x="-20%" y="-20%" width="150%" height="180%">
    <feDropShadow dx="0" dy="8"  stdDeviation="10" flood-color="#000" flood-opacity="0.32"/>
    <feDropShadow dx="0" dy="2"  stdDeviation="3"  flood-color="#000" flood-opacity="0.18"/>
  </filter>
</defs>

<!-- FLOOR SHADOW -->
<g class="shadow-fl">
  <ellipse cx="126" cy="188" rx="112" ry="10" fill="#000" fill-opacity="0.22"/>
</g>

<g filter="url(#f-float)">

  <!-- 1 CHASSIS -->
  <g class="chassis">
    <rect x="22" y="138" width="208" height="18" rx="5"
          fill="url(#g-dark)" stroke="#606070" stroke-width="1"/>
    <path d="M22 148 Q126 156 230 148 L230 156 Q126 162 22 156Z"
          fill="url(#g-dark)" fill-opacity="0.5"/>
  </g>

  <!-- 2 LOWER BODY -->
  <g class="body-lower">
    <path d="M14 108 Q16 90 34 88 L218 88 Q234 90 236 108 L236 144 Q234 152 218 154 L34 154 Q16 152 14 144Z"
          fill="url(#g-surf)" stroke="#A0A0B0" stroke-width="1.2"/>
    <path d="M16 134 Q126 148 234 134 L236 144 Q234 152 218 154 L34 154 Q16 152 14 144Z"
          fill="url(#g-dark)" fill-opacity="0.55"/>
    <line x1="126" y1="90" x2="126" y2="152" stroke="#9090A0" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="88"  y="118" width="22" height="7" rx="3.5" fill="url(#g-side)" stroke="#909098" stroke-width="0.7"/>
    <rect x="142" y="118" width="22" height="7" rx="3.5" fill="url(#g-side)" stroke="#909098" stroke-width="0.7"/>
  </g>

  <!-- 3 ROOF -->
  <g class="roof">
    <path d="M56 88 Q66 50 86 44 L166 44 Q186 50 196 88Z"
          fill="url(#g-surf)" stroke="#A8A8B8" stroke-width="1.2"/>
    <path d="M136 88 L196 88 Q186 50 166 44 L136 44Z"
          fill="url(#g-side)" fill-opacity="0.45"/>
    <path d="M76 80 Q126 72 188 80"
          fill="none" stroke="white" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>
    <path d="M56 88 Q66 50 86 44 L166 44 Q186 50 196 88"
          fill="none" stroke="#303040" stroke-width="2.5" stroke-opacity="0.12"/>
  </g>

  <!-- 4 WINDSHIELD -->
  <g class="windshield">
    <path d="M78 86 Q88 57 100 51 L152 51 Q164 57 174 86Z"
          fill="url(#g-glass)" stroke="#9090A8" stroke-width="0.9"/>
    <path d="M84 80 Q102 59 118 54"
          fill="none" stroke="white" stroke-width="1.8" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- 5 SIDE WINDOWS -->
  <g class="side-win">
    <path d="M58 86 Q64 62 76 56 L74 86Z" fill="url(#g-glass)" stroke="#9090A8" stroke-width="0.8"/>
    <path d="M194 86 Q188 62 176 56 L178 86Z" fill="url(#g-glass)" stroke="#9090A8" stroke-width="0.8"/>
  </g>

  <!-- 6 HEADLIGHTS -->
  <g class="headlights">
    <rect x="14" y="96" width="28" height="18" rx="5" fill="url(#g-surf)" stroke="#A8A8B8" stroke-width="1"/>
    <ellipse cx="28" cy="105" rx="8" ry="5.5" fill="url(#g-glass)" stroke="#B0B0C0" stroke-width="0.7"/>
    <ellipse cx="25" cy="103" rx="3" ry="2" fill="white" fill-opacity="0.7"/>
  </g>

  <!-- 7 TAILLIGHTS -->
  <g class="taillights">
    <rect x="210" y="96" width="28" height="18" rx="5" fill="url(#g-side)" stroke="#909098" stroke-width="1"/>
    <ellipse cx="224" cy="105" rx="8" ry="5.5" fill="#C0C0CC" stroke="#909098" stroke-width="0.7"/>
  </g>

  <!-- 8 DETAIL LINES -->
  <g class="details">
    <path d="M18 98 Q126 90 232 98"
          fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.45" stroke-linecap="round"/>
    <path d="M14 108 Q16 90 34 88 L218 88 Q234 90 236 108"
          fill="none" stroke="#303040" stroke-width="3" stroke-opacity="0.1"/>
    <path d="M18 126 Q126 120 232 126"
          fill="none" stroke="white" stroke-width="1" stroke-opacity="0.18" stroke-linecap="round"/>
  </g>

  <!-- 9 WHEEL LEFT -->
  <g class="wheel-l">
    <circle cx="64" cy="158" r="26" fill="url(#g-tire)" stroke="#282830" stroke-width="1.4"/>
    <circle cx="64" cy="158" r="17" fill="url(#g-rim)"  stroke="#606070" stroke-width="1"/>
    <line x1="64"  y1="141" x2="64"  y2="175" stroke="#707080" stroke-width="1.2"/>
    <line x1="47"  y1="158" x2="81"  y2="158" stroke="#707080" stroke-width="1.2"/>
    <line x1="52"  y1="146" x2="76"  y2="170" stroke="#707080" stroke-width="1.2"/>
    <line x1="76"  y1="146" x2="52"  y2="170" stroke="#707080" stroke-width="1.2"/>
    <circle cx="64" cy="158" r="6" fill="url(#g-surf)" stroke="#909098" stroke-width="0.8"/>
    <path d="M44 142 Q56 136 70 138" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- 10 WHEEL RIGHT -->
  <g class="wheel-r">
    <circle cx="188" cy="158" r="26" fill="url(#g-tire)" stroke="#282830" stroke-width="1.4"/>
    <circle cx="188" cy="158" r="17" fill="url(#g-rim)"  stroke="#606070" stroke-width="1"/>
    <line x1="188" y1="141" x2="188" y2="175" stroke="#707080" stroke-width="1.2"/>
    <line x1="171" y1="158" x2="205" y2="158" stroke="#707080" stroke-width="1.2"/>
    <line x1="176" y1="146" x2="200" y2="170" stroke="#707080" stroke-width="1.2"/>
    <line x1="200" y1="146" x2="176" y2="170" stroke="#707080" stroke-width="1.2"/>
    <circle cx="188" cy="158" r="6" fill="url(#g-surf)" stroke="#909098" stroke-width="0.8"/>
    <path d="M168 142 Q180 136 194 138" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- 11 BUMPERS -->
  <g class="bumpers">
    <rect x="10"  y="140" width="32" height="12" rx="4" fill="url(#g-side)" stroke="#909098" stroke-width="1"/>
    <rect x="210" y="140" width="32" height="12" rx="4" fill="url(#g-side)" stroke="#909098" stroke-width="1"/>
  </g>

  <!-- 12 FINAL GLOSS -->
  <g class="gloss">
    <ellipse cx="126" cy="60" rx="28" ry="8" fill="white" fill-opacity="0.12" transform="rotate(-5 126 60)"/>
    <path d="M34 100 Q80 92 118 96"
          fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3" stroke-linecap="round"/>
  </g>

</g>
</svg>
